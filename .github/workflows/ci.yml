name: Django CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        django-version: ["pinned", "5.2"]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Install requirements
      run: make requirements
    - name: Upgrade packages
      run: |
        pip install -U pip wheel -c requirements/constraints.txt
        if [[ "${{ matrix.django-version }}" != "pinned" ]]; then
          pip install "django~=${{ matrix.django-version }}.0"
          pip check # fail if this test-reqs/Django combination is broken
        fi
    - name: Validate translations
      run: make validate_translations
    - name: Run tests
      run: make test
    - name: Upload coverage
      if: matrix.django-version == 'pinned'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Install requirements
      run: make requirements
    - name: Upgrade packages
      run: pip install -U pip wheel
    - name: Run pylint
      run: make lint
    - name: Run pycodestyle
      run: make style
    - name: Run isort
      run: make isort_check
    - name: Run pii check
      run: make pii_check
